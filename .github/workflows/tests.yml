# Parser regression tests — golden-file tests for the ATS spiders plus
# enrichment unit tests. Catches silent ATS format drift before it ships.

name: Scraper tests

on:
  push:
    paths:
      - "scraper/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "scraper/**"

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
